<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小路人 · 导航</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>🧭</text></svg>">
<style>
:root{
  --glass:rgba(255,255,255,0.12);
  --glass-hover:rgba(255,255,255,0.18);
  --border:rgba(255,255,255,0.15);
  --text:#f0f0f0;
  --dim:rgba(255,255,255,0.6);
  --bg:#12122a;
  --panel-bg:rgba(10,10,30,.97);
  --panel-item:rgba(255,255,255,0.06);
}
body.light{
  --glass:rgba(255,255,255,0.8);
  --glass-hover:rgba(255,255,255,1);
  --border:rgba(0,0,0,0.1);
  --text:#111;
  --dim:rgba(0,0,0,0.5);
  --bg:#f5f7fa;
  --panel-bg:rgba(255,255,255,0.95);
  --panel-item:rgba(0,0,0,0.05);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden;transition:all .4s ease;}
.bg{position:fixed;inset:0;z-index:0;
background:radial-gradient(ellipse at 20% 20%,rgba(120,80,255,0.25) 0%,transparent 50%),
radial-gradient(ellipse at 80% 80%,rgba(255,60,120,0.2) 0%,transparent 50%),
radial-gradient(ellipse at 50% 50%,rgba(60,160,255,0.15) 0%,transparent 60%);
transition:background .4s;}
body.light .bg{
background:radial-gradient(ellipse at 20% 20%,rgba(120,80,255,0.1) 0%,transparent 50%),
radial-gradient(ellipse at 80% 80%,rgba(255,60,120,0.08) 0%,transparent 50%),
radial-gradient(ellipse at 50% 50%,rgba(60,160,255,0.08) 0%,transparent 60%);}

.topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.logo{font-size:1.2em;font-weight:700;letter-spacing:4px;color:#fff}
.logo span{background:linear-gradient(90deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
body.light .logo{color:#111}
.weather{display:flex;align-items:center;gap:8px;font-size:13px}
.weather-icon{font-size:1.3em}
.weather-info{display:flex;flex-direction:column}
.weather-temp{font-size:15px;font-weight:600;color:#fff}
body.light .weather-temp{color:#111}
.weather-city{font-size:11px;color:var(--dim)}
.weather-desc{font-size:11px;color:var(--dim)}
.music-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.08);border:1px solid var(--border);border-radius:50px;padding:8px 14px 8px 8px;cursor:pointer;transition:all .3s ease;min-width:240px;max-width:300px}
.music-bar:hover{transform:perspective(500px) translateZ(6px) scale(1.02);box-shadow:0 8px 20px rgba(0,0,0,0.15)}
body.light .music-bar{background:rgba(0,0,0,0.05)}
.mcover{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7c6df0,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;overflow:hidden;transition:transform .3s}
.mcover.playing{animation:spinCover 10s linear infinite}
@keyframes spinCover{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.minfo{min-width:0;flex:1;overflow:hidden}
.mname{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
body.light .mname{color:#111}
.martist{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.mbtns{display:flex;gap:2px;align-items:center}
.mbtn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;padding:3px;transition:all .2s ease;line-height:1;flex-shrink:0}
.mbtn:hover{transform:scale(1.15);color:#fff}
body.light .mbtn:hover{color:#111}
.top-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:36px 28px 80px}
.search-box{text-align:center;margin-bottom:40px;animation:fadeDown .8s ease both}
.swrap{position:relative;max-width:620px;margin:0 auto}
.swrap input{width:100%;padding:14px 50px 14px 22px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:50px;color:#fff;font-size:15px;backdrop-filter:blur(20px);transition:all .3s ease;outline:none}
body.light .swrap input{background:rgba(0,0,0,0.05);border:1px solid rgba(0,0,0,0.1);color:#111}
.swrap input::placeholder{color:var(--dim)}
.swrap input:focus{background:rgba(255,255,255,0.15);border-color:rgba(167,139,250,0.5);box-shadow:0 0 0 3px rgba(167,139,250,0.15)}
body.light .swrap input:focus{background:rgba(255,255,255,1);border-color:rgba(167,139,250,0.5)}
.si{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:17px;cursor:pointer;transition: all 0.2s}
.si:hover{transform: translateY(-50%) scale(1.15); color: #fff;}
.engines{display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.epill{padding:4px 14px;border-radius:20px;background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--dim);font-size:12px;cursor:pointer;transition:all .3s ease}
body.light .epill{background:rgba(0,0,0,0.05)}
.epill.active,.epill:hover{background:rgba(167,139,250,0.3);color:#fff;border-color:rgba(167,139,250,0.5);transform:perspective(500px) translateZ(4px) scale(1.05)}
body.light .epill.active,body.light .epill:hover{color:#fff}
.cat{margin-bottom:36px}
.catt{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.catt .dot{width:4px;height:20px;border-radius:2px;background:linear-gradient(180deg,#a78bfa,#f472b6);box-shadow:0 0 8px rgba(167,139,250,0.5)}
.catt h2{font-size:.9em;font-weight:400;color:var(--dim);letter-spacing:3px;text-transform:uppercase}
.catt .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* 苹果3D卡片效果 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px}
.card{position:relative;background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:22px 12px 16px;text-align:center;cursor:pointer;text-decoration:none;color:var(--text);backdrop-filter:blur(10px);transition:all 0.35s cubic-bezier(.3,.9,.2,1);animation:fadeUp .4s ease both;overflow:hidden;display:block;transform:perspective(800px) translateZ(0);}
.card:hover{transform:perspective(800px) translateZ(25px) scale(1.08) rotateY(1deg) rotateX(-1deg);background:var(--glass-hover);border-color:rgba(167,139,250,0.4);box-shadow:0 24px 48px rgba(0,0,0,0.25),0 0 20px rgba(167,139,250,0.15)}
.cglow{position:absolute;inset:-1px;border-radius:16px;background:linear-gradient(135deg,rgba(167,139,250,.2),rgba(244,114,182,.1));opacity:0;transition:opacity .3s;pointer-events:none;z-index:-1}
.card:hover .cglow{opacity:1}
.ci{font-size:2.2em;margin-bottom:10px;display:block;transition: transform 0.25s ease;}
.card:hover .ci{transform:scale(1.15);}
.cn{font-size:13px;font-weight:500;line-height:1.4;word-break:break-all}
.ctag{position:absolute;top:8px;right:8px;font-size:9px;padding:2px 6px;border-radius:7px;background:linear-gradient(135deg,#7c6df0,#a78bfa);color:#fff;opacity:0;transition:opacity .3s}
.card:hover .ctag{opacity:1}
footer{text-align:center;color:var(--dim);font-size:12px;padding:20px;letter-spacing:1px}

/* 内网按钮 苹果3D */
.lan-btn{position:fixed;top:40%;right:24px;transform:translateY(-50%);z-index:99;background:linear-gradient(135deg,#7c6df0,#a78bfa);color:#fff;border:none;border-radius:22px;cursor:pointer;font-size:13px;letter-spacing:1px;box-shadow:0 4px 20px rgba(124,109,240,0.4);transition:all 0.35s cubic-bezier(.3,.9,.2,1);padding:8px 10px;height:64px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between}
.lan-btn:hover{transform:translateY(-50%) scale(1.12);box-shadow:0 12px 30px rgba(124,109,240,0.4);}

/* 日夜切换按钮 */
.theme-btn{position:fixed;top:calc(40% + 80px);right:24px;transform:translateY(-50%);z-index:99;background:linear-gradient(135deg,#7c6df0,#a78bfa);color:#fff;border:none;border-radius:22px;cursor:pointer;font-size:13px;letter-spacing:1px;box-shadow:0 4px 20px rgba(124,109,240,0.4);transition:all 0.35s cubic-bezier(.3,.9,.2,1);padding:8px 10px;height:64px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between}
.theme-btn:hover{transform:translateY(-50%) scale(1.12);box-shadow:0 12px 30px rgba(124,109,240,0.4);}

/* 内网面板 - 吹气球 + 放气动画 */
.lan-panel{
  position:fixed;
  right:88px;
  top:40%;
  transform:translateY(-50%) scale(0.2);
  width:210px;
  background:var(--panel-bg);
  border:1px solid var(--border);
  border-radius:16px;
  backdrop-filter:blur(20px);
  z-index:99;
  opacity:0;
  pointer-events:none;
  padding:20px 16px;
  box-shadow:-4px 0 30px rgba(0,0,0,.25);
  transition:all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
}
.lan-panel.open{
  opacity:1;
  pointer-events:all;
  transform:translateY(-50%) scale(1);
}
.lan-panel h3{color:var(--text);font-size:13px;margin-bottom:14px;letter-spacing:2px;text-align:center;padding-bottom:10px;border-bottom:1px solid var(--border)}
.lan-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--panel-item);border:1px solid var(--border);color:var(--text);text-decoration:none;font-size:12px;margin-bottom:7px;transition:all 0.35s cubic-bezier(.3,.9,.2,1);transform:perspective(800px) translateZ(0);}
.lan-item:hover{background:rgba(167,139,250,0.15);border-color:rgba(167,139,250,0.6);color:var(--text);transform:perspective(800px) translateZ(20px) scale(1.08) rotateY(1deg);box-shadow:0 12px 24px rgba(0,0,0,0.15);}
.lan-tip{font-size:11px;color:var(--dim);line-height:1.6;margin-top:14px;padding:10px;background:var(--panel-item);border-radius:8px;border:1px solid var(--border)}
.lan-tip strong{color:var(--dim)}

/* 音乐面板 */
#mp{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(110%);width:420px;max-width:95vw;background:var(--panel-bg);border:1px solid var(--border);border-bottom:none;border-radius:20px 20px 0 0;backdrop-filter:blur(30px);padding:20px 22px 28px;z-index:200;transition:transform .4s cubic-bezier(.3,.9,.2,1);max-height:88vh;overflow-y:auto}
#mp.show{transform:translateX(-50%) translateY(0)}
.mph{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mpt{font-size:14px;font-weight:600;color:var(--text)}
.mpcls{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer}
.mpalbum{width:130px;height:130px;margin:0 auto 12px;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#2a2a4a,#1a1a3a);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.mpcd{width:90px;height:90px;border-radius:50%;background:conic-gradient(#333,#222,#333);display:flex;align-items:center;justify-content:center;transition:transform .3s}
.mpalbum.playing .mpcd{animation:spinSlow 12s linear infinite}
@keyframes spinSlow{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.mpcdc{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#7c6df0,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:13px}
.mpn{font-size:14px;font-weight:600;text-align:center;margin-bottom:2px;color:var(--text)}
.mpa{font-size:11px;color:var(--dim);text-align:center;margin-bottom:12px}
.mpbar{width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer;margin-bottom:5px}
body.light .mpbar{background:rgba(0,0,0,.1)}
.mpfill{height:100%;background:linear-gradient(90deg,#7c6df0,#a78bfa);border-radius:2px;width:0%;transition:width .3s}
.mptimes{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:12px}
.mpctrl{display:flex;justify-content:center;align-items:center;gap:14px}
.mpctrl button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:20px;transition:all .2s ease}
.mpctrl button:hover{color:var(--text);transform:scale(1.15)}
.mpctrl .playb{font-size:30px;color:var(--text)}
.mpctrl .playb:hover{color:#a78bfa}
.mplistbtn{background:var(--panel-item);border:1px solid var(--border);border-radius:50px;padding:6px 16px;color:var(--dim);font-size:12px;cursor:pointer;margin-top:10px;width:100%;transition:all .2s}
.mplistbtn:hover{background:rgba(167,139,250,0.15);color:var(--text)}
.mpres{max-height:160px;overflow-y:auto;margin-top:8px;display:none}
.mpres.show{display:block}
.mpitem{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:all .25s ease}
.mpitem:hover{background:rgba(167,139,250,0.1);transform:scale(1.03)}
.mpitem.playing{background:rgba(167,139,250,0.15)}
.mpitem.playing .rin{color:#a78bfa}
.rin{font-size:13px;color:var(--text)}
.ria{font-size:11px;color:var(--dim)}
.rip{font-size:13px;color:var(--dim);margin-left:auto}
.mpsearch{display:flex;gap:8px;margin-bottom:8px}
.mpsearch input{flex:1;padding:6px 10px;background:var(--panel-item);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none}
.mpsearch input::placeholder{color:var(--dim)}
.mpsearchbtn{padding:6px 12px;border-radius:8px;background:linear-gradient(135deg,#7c6df0,#a78bfa);border:none;color:#fff;font-size:12px;cursor:pointer}
.lyrics{max-height:90px;overflow-y:auto;margin-bottom:10px;padding:0 4px;scrollbar-width:thin;scrollbar-color:rgba(167,139,250,0.3) transparent}
.lyrics::-webkit-scrollbar{width:3px}.lyrics::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.3);border-radius:2px}
.lyric-line{font-size:12px;color:var(--dim);line-height:1.8;transition:color .3s,font-size .3s;padding:1px 0;text-align:center}
.lyric-line.active{color:var(--text);font-size:14px;font-weight:600;text-shadow:0 0 16px rgba(167,139,250,0.5)}
.lyric-empty{font-size:12px;color:var(--dim);text-align:center;padding:6px 0}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* 密码锁 */
#lock{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
#lock input{padding:14px 20px;border-radius:12px;border:1px solid var(--border);background:var(--panel-item);color:var(--text);font-size:16px;width:260px;outline:none;text-align:center}
#lock input:focus{border-color:#a78bfa}
#lock button{padding:12px 24px;border-radius:12px;background:#a78bfa;color:#fff;border:none;cursor:pointer;font-size:15px;transition:all .3s ease}
#lock button:hover{transform:scale(1.08);background:#8b5cf6}

@media(max-width:768px){
  .topbar{padding:8px 14px;gap:6px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .wrap{padding:20px 14px 90px}
  .lan-btn{top:38%;right:8px;height:56px}
  .theme-btn{top:calc(38% + 65px);right:8px;height:56px}
  .lan-panel{right:42px;width:170px}
}
</style>
</head>
<body>

<!-- 密码锁 -->
<div id="lock">
  <input type="password" id="pwd" placeholder="请输入访问密码" autocomplete="off">
  <button onclick="checkPwd()">确认进入</button>
</div>

<div class="bg"></div>
<button class="lan-btn" onclick="toggleLan()"><span>🌐</span><span>内</span><span>网</span></button>
<button class="theme-btn" onclick="toggleTheme()"><span>🌓</span><span>日</span><span>夜</span></button>

<div class="lan-panel" id="lanPanel">
  <h3>🌐 内网服务</h3>
  <a class="lan-item" href="http://192.168.2.225:8000" target="_blank">🖥️ 飞牛OS</a>
  <a class="lan-item" href="http://192.168.2.225:8000/v" target="_blank">🎬 飞牛影视</a>
  <a class="lan-item" href="http://192.168.2.225:3000" target="_blank">🎥 MoviePilot</a>
  <a class="lan-item" href="http192.168.2.225:5173" target="_blank">▶ 道理鱼</a>
  <a class="lan-item" href="http://192.168.2.225:9527" target="_blank">🎵 落雪音乐</a>
  <a class="lan-item" href="http://192.168.2.1" target="_blank">📡 路由器</a>
  <a class="lan-item" href="http://192.168.2.252" target="_blank">⚡ Opwert</a>
  <div class="lan-tip"><strong>💡 提示：</strong>内网服务需在同局域网</div>
</div>

<div class="topbar">
  <div class="logo">小 路 人<span>·</span>导 航</div>
  <div class="weather">
    <span class="weather-icon" id="wicon">🌤</span>
    <div class="weather-info">
      <span class="weather-temp" id="wtemp">--°</span>
      <span class="weather-city" id="wcity">定位中</span>
      <span class="weather-desc" id="wdesc">--</span>
    </div>
  </div>
  <div class="top-right">
    <div class="music-bar" id="musicBar" onclick="toggleMP()">
      <div class="mcover" id="mcover">🎵</div>
      <div class="minfo">
        <div class="mname" id="mname">点击播放</div>
        <div class="martist" id="martist">小路人</div>
      </div>
      <div class="mbtns" onclick="event.stopPropagation()">
        <button class="mbtn" onclick="prevT()">⏮</button>
        <button class="mbtn" onclick="togPlay()" id="pbtn">▶</button>
        <button class="mbtn" onclick="nextT()">⏭</button>
      </div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="search-box">
    <div class="swrap">
      <input type="text" id="sInput" placeholder="🔍 输入关键词，按回车搜索..." onkeydown="if(event.key==='Enter')goSearch()">
      <span class="si" onclick="goSearch()">🔍</span>
    </div>
    <div class="engines">
      <span class="epill active" onclick="setE('baidu',this)">百度</span>
      <span class="epill" onclick="setE('bing',this)">必应</span>
      <span class="epill" onclick="setE('google',this)">Google</span>
      <span class="epill" onclick="setE('ddg',this)">DuckDuckGo</span>
    </div>
  </div>
  <div class="cat"><div class="catt"><div class="dot"></div><h2>私有服务</h2><div class="ln"></div></div><div class="grid" id="cl"></div></div>
  <div class="cat"><div class="catt"><div class="dot"></div><h2>工具导航</h2><div class="ln"></div></div><div class="grid" id="ct"></div></div>
  <div class="cat"><div class="catt"><div class="dot"></div><h2>PT · 资源</h2><div class="ln"></div></div><div class="grid" id="cp"></div></div>
  <div class="cat"><div class="catt"><div class="dot"></div><h2>开发 · 云服务</h2><div class="ln"></div></div><div class="grid" id="cd"></div></div>
  <footer>✦ 小路人导航 · 让效率成为一种习惯 ✦</footer>
</div>

<div id="mp">
  <div class="mph"><span class="mpt">🎵 音乐播放</span><button class="mpcls" onclick="toggleMP()">✕</button></div>
  <div class="mpsearch">
    <input type="text" id="mpSInput" placeholder="搜索歌曲..." onkeydown="if(event.key==='Enter')srchMusic()">
    <button class="mpsearchbtn" onclick="srchMusic()">🔍 搜索</button>
  </div>
  <div id="playerWrap" style="display:none;margin:8px 0 4px">
    <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--panel-item);border-radius:12px;border:1px solid var(--border)">
      <img id="songImg" src="" style="width:48px;height:48px;border-radius:8px;flex-shrink:0;object-fit:cover;background:linear-gradient(135deg,#7c6df0,#f472b6)">
      <div style="flex:1;min-width:0">
        <div id="songTitle" style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">--</div>
        <div id="songArtist" style="font-size:10px;color:var(--dim);margin-top:2px">--</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <button class="mbtn" onclick="prevT()" style="font-size:18px">⏮</button>
        <button class="mbtn" onclick="togPlay()" id="pbtn2" style="font-size:24px;color:#a78bfa">▶</button>
        <button class="mbtn" onclick="nextT()" style="font-size:18px">⏭</button>
      </div>
    </div>
    <div id="mpBar" style="width:100%;height:4px;background:var(--panel-item);border-radius:2px;cursor:pointer;margin-top:6px;position:relative">
      <div id="mpFill" style="height:100%;background:linear-gradient(90deg,#7c6df0,#a78bfa);border-radius:2px;width:0%;transition:width .3s;pointer-events:none"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:4px">
      <span id="mpCur">0:00</span><span id="mpDur">0:30</span>
    </div>
  </div>
  <div id="searchTip" style="text-align:center;font-size:11px;color:var(--dim);margin:4px 0">🔍 输入歌名/歌手，点搜索</div>
  <div id="songListWrap" style="border-top:1px solid var(--border);padding-top:6px;margin-top:4px">
    <div style="font-size:10px;color:var(--dim);margin-bottom:4px;letter-spacing:1px">📋 播放列表</div>
    <div id="mpRes" style="max-height:200px;overflow-y:auto"></div>
  </div>
</div>

<audio id="audioEl" style="display:none">

<script>
// ==============================================
// 1. 密码验证 + 记住密码（本地存储）
// ==============================================
const CORRECT_PWD = 'a1234567';
function checkPwd(){
  let val = document.getElementById('pwd').value.trim();
  if(val === CORRECT_PWD){
    localStorage.setItem('user_pwd', val);
    document.getElementById('lock').style.display = 'none';
  }else{
    alert('密码错误，请重试！');
  }
}
// 自动登录
window.addEventListener('DOMContentLoaded', () => {
  if(localStorage.getItem('user_pwd') === CORRECT_PWD){
    document.getElementById('lock').style.display = 'none';
  }
});
document.getElementById('pwd').addEventListener('keydown',function(e){
  if(e.key === 'Enter') checkPwd();
});

// ==============================================
// 2. 日夜模式
// ==============================================
function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
(function loadTheme() {
  if(localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light');
  }
})();

// ==============================================
// 3. 高德天气（已修复，使用你的API）
// ==============================================
const AMAP_KEY = 'e6529af7ef8ded3cb5719fc90dda27d8';
async function loadWeather() {
  try {
    // IP定位
    const ipRes = await fetch(`https://restapi.amap.com/v3/ip?key=${AMAP_KEY}`);
    const ipData = await ipRes.json();
    const city = ipData.city || '深圳市';
    
    // 天气查询
    const weatherRes = await fetch(`https://restapi.amap.com/v3/weather/weatherInfo?key=${AMAP_KEY}&city=${encodeURIComponent(city)}&extensions=base`);
    const weatherData = await weatherRes.json();
    
    if (weatherData?.lives?.[0]) {
      const d = weatherData.lives[0];
      const icon = d.weather.includes('雨') ? '🌧' :
                   d.weather.includes('雪') ? '❄️' :
                   d.weather.includes('阴') ? '⛅' :
                   d.weather.includes('多云') ? '🌥' :
                   d.weather.includes('晴') ? '☀️' : '🌤';
      
      document.getElementById('wicon').textContent = icon;
      document.getElementById('wtemp').textContent = d.temperature + '°';
      document.getElementById('wcity').textContent = city;
      document.getElementById('wdesc').textContent = d.weather + ' ' + d.winddirection + d.windpower + '级';
    }
  } catch (err) {
    document.getElementById('wcity').textContent = '天气获取失败';
  }
}
loadWeather();

// ==============================================
// 4. 内网面板 吹气球 + 放气动画
// ==============================================
function toggleLan() {
  const panel = document.getElementById('lanPanel');
  panel.classList.toggle('open');
}

// ==============================================
// 导航数据 & 渲染（已更换自建魔法图标）
// ==============================================
const LINKS=[
  {name:"MoviePilot",icon:"🎬",url:"http://li0580.top:3000",cat:"local",tag:"影视"},
  {name:"飞牛OS",icon:"🖥️",url:"http://li0580.top:8000",cat:"local",tag:"NAS"},
  {name:"道理鱼",icon:"🔍",url:"http://li0580.top:5173",cat:"local",tag:"搜索"},
  {name:"落雪音乐",icon:"🎵",url:"http://li0580.top:9527",cat:"local",tag:"音乐"},
  {name:"Haho博客",icon:"📝",url:"http://li0580.top:8090",cat:"local",tag:"博客"},
  {name:"爱快路由",icon:"📡",url:"http://li0580.top:2025",cat:"local",tag:"路由"},
  {name:"MagicPush",icon:"🔔",url:"http://li0580.top:818",cat:"local",tag:"推送"},
  {name:"订阅管理系统",icon:"📰",url:"http://lvl.de5.net/",cat:"local",tag:"订阅"},
  {name:"小路人TV",icon:"📺",url:"https://lovol.de5.net/",cat:"local",tag:"影视"},
  {name:"订阅转换",icon:"🔄",url:"https://acl4ssr-sub.github.io/",cat:"tools",tag:"订阅"},
  {name:"盘链",icon:"🔗",url:"https://pinglian.lol/index.php",cat:"tools",tag:"链接"},
  {name:"文生图",icon:"🎨",url:"http://xlwst.cc.cd/",cat:"tools",tag:"AI"},
  {name:"蓝影汇",icon:"🎥",url:"https://hdblue.cc",cat:"tools",tag:"影视"},
  {name:"金牌影院",icon:"🏅",url:"https://www.vv3nwjk.com",cat:"tools",tag:"影院"},
  {name:"免费域名",icon:"🌐",url:"https://my.dnshe.com/",cat:"tools",tag:"域名"},
  {name:"网络服务",icon:"🌀",url:"https://ptcc.cc.cd/admin",cat:"pt",tag:"服务"},
  {name:"蜂巢PT",icon:"🐝",url:"https://pting.club",cat:"pt",tag:"PT"},
  {name:"总导航",icon:"🛠️",url:"https://li0580.com",cat:"pt",tag:"导航"},
  {name:"谷歌邮箱",icon:"📧",url:"https://mail.google.com/",cat:"dev",tag:"邮箱"},
  {name:"Cloudflare",icon:"☁️",url:"https://dash.cloudflare.com/",cat:"dev",tag:"云"},
  {name:"GitHub",icon:"🐙",url:"https://github.com/",cat:"dev",tag:"代码"},
];
const m2={local:'cl',tools:'ct',pt:'cp',dev:'cd'};
function render(){for(const[c,id]of Object.entries(m2)){const el=document.getElementById(id);el.innerHTML=LINKS.filter(l=>l.cat===c).map(l=>`<a class="card" href="${l.url}" target="_blank" rel="noopener noreferrer"><div class="cglow"></div><span class="ctag">${l.tag}</span><span class="ci">${l.icon}</span><div class="cn">${l.name}</div></a>`).join('');}}

// ==============================================
// 搜索功能
// ==============================================
const eng={baidu:'https://www.baidu.com/s?wd=',bing:'https://www.bing.com/search?q=',google:'https://www.google.com/search?q=',ddg:'https://duckduckgo.com/?q='};
let curE='baidu';
function goSearch(){const q=document.getElementById('sInput').value.trim();if(q) window.open(eng[curE]+encodeURIComponent(q),'_blank');}
function setE(n,el){curE=n;document.querySelectorAll('.epill').forEach(p=>p.classList.remove('active'));el.classList.add('active');}

// ==============================================
// 音乐播放
// ==============================================
let pl=[],pi=0,play2=false,mpOpen=false;
const audio=document.getElementById('audioEl');
async function srchMusic(){
  const q=document.getElementById('mpSInput').value.trim()||'夜空中最亮的星';
  try{
    const r=await fetch('https://itunes.apple.com/search?term='+encodeURIComponent(q)+'&media=music&entity=song&limit=12');
    const d=await r.json();
    if(d.results&&d.results.length){
      pl=d.results.map(s=>({
        title:s.trackName||'未知',author:s.artistName||'',album:s.collectionName||'',
        duration:s.trackTimeMillis||30000,pic:s.artworkUrl100?.replace('100x100','300x300')||'',url:s.previewUrl||'',
      }));
      renderRes();if(pl.length) playT(0);
    }else{document.getElementById('mpRes').innerHTML='<div style="text-align:center;padding:16px;color:var(--dim);font-size:12px">未找到</div>';}
  }catch(e){document.getElementById('mpRes').innerHTML='<div style="text-align:center;padding:16px;color:var(--dim);font-size:12px">搜索失败</div>';}
}
function renderRes(){
  const el=document.getElementById('mpRes');
  el.innerHTML=pl.map((t,i)=>{
    const playing=i===pi&&play2?' playing':'';
    return`<div class="mpitem${playing}" onclick="playT(${i})"><div class="rin">${t.title}</div><div class="ria">${t.author}</div><span class="rip">${i===pi&&play2?'⏸':'▶'}</span></div>`;
  }).join('');
}
function playT(i){
  if(!pl.length)return;pi=i;const t=pl[pi];
  document.getElementById('mname').textContent=t.title;
  document.getElementById('martist').textContent=t.author;
  document.getElementById('pbtn').textContent='⏸';
  document.getElementById('pbtn2').textContent='⏸';
  document.getElementById('mcover').classList.add('playing');
  document.getElementById('playerWrap').style.display='block';
  document.getElementById('songImg').src=t.pic;
  document.getElementById('songTitle').textContent=t.title;
  document.getElementById('songArtist').textContent=t.author;
  document.getElementById('mpDur').textContent=fmt(t.duration/1000);
  audio.src=t.url||'';audio.currentTime=0;
  document.getElementById('mpFill').style.width='0%';
  audio.play().then(()=>{play2=true;renderRes();}).catch(()=>{play2=false;});
  audio.ontimeupdate=()=>{if(audio.duration){const pct=(audio.currentTime/audio.duration*100).toFixed(1);document.getElementById('mpFill').style.width=pct+'%';document.getElementById('mpCur').textContent=fmt(audio.currentTime);}};
  audio.onended=()=>{nextT();};
}
function fmt(s){return Math.floor(s/60)+':'+(Math.floor(s%60)+'').padStart(2,'0');}
function togPlay(){
  if(!pl.length){document.getElementById('mpSInput').value='夜空中最亮的星';srchMusic();return;}
  if(play2){audio.pause();play2=false;document.getElementById('pbtn').textContent='▶';document.getElementById('pbtn2').textContent='▶';document.getElementById('mcover').classList.remove('playing');}
  else{audio.play().then(()=>{play2=true;document.getElementById('pbtn').textContent='⏸';document.getElementById('pbtn2').textContent='⏸';document.getElementById('mcover').classList.add('playing');});}
  renderRes();
}
function nextT(){if(pl.length)playT((pi+1)%pl.length);}
function prevT(){if(pl.length)playT((pi-1+pl.length)%pl.length);}
function toggleMP(){mpOpen=!mpOpen;document.getElementById('mp').classList.toggle('show',mpOpen);if(mpOpen&&!pl.length){document.getElementById('mpSInput').value='夜空中最亮的星';srchMusic();}}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('mpBar')?.addEventListener('click',e=>{
    const bar=document.getElementById('mpBar');const rect=bar.getBoundingClientRect();
    if(audio.duration)audio.currentTime=(e.clientX-rect.left)/rect.width*audio.duration;
  });
});
</script>
